name: CI

on:
  push:
    branches: [master, milestone-2]
  pull_request:
    branches: [master, milestone-2]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # npm install (no ci): el lockfile local quedo desactualizado por eslint
      # (no se pudo regenerar por un npm roto en la maquina de desarrollo).
      - run: npm install
      - run: npm run lint
      - run: npm test -- --run

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run build
